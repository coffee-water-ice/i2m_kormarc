services:
  - type: web
    name: i2m-kormarc-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      # 아래 키들은 sync: false — Render 대시보드(Environment 탭)에서 직접 값을 입력해야 함.
      # .env.example에 정리된 것과 동일한 키 목록 (core/config.py의 Settings 참고).
      - key: ALADIN_TTB_KEY
        sync: false
      - key: ALADIN_TTB_KEY2
        sync: false
      - key: ALADIN_TTB_KEY3
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: KPIPA_API_KEY
        sync: false
      - key: DATA_GO_KR
        sync: false
      - key: NLK_CERT_KEY
        sync: false
      - key: NAVER_SEARCH_KEY_ID
        sync: false
      - key: NAVER_SEARCH_KEY_SECRET
        sync: false
      - key: GSPREAD_CREDENTIALS
        sync: false
      - key: FEEDBACK_DB_PATH
        value: ./feedback.db
